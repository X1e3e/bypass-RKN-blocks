services:
  amnezia-wg-easy:
    image: ghcr.io/spcfox/amnezia-wg-easy:latest
    container_name: amnezia-wg-easy
    restart: unless-stopped
    environment:
      - LANGUAGE=ru
      - WG_HOST=your_server_ip_or_domain # Замените на публичный IP вашего VPS
      - PASSWORD=your_admin_password     # Пароль для доступа к Web-панели управления
      - PORT=51821                       # Порт Web-панели управления
      - WG_PORT=51820                    # Основной порт подключения AmneziaWG
      # Значения обхода DPI по умолчанию (AmneziaWG):
      - AWG_JC=4
      - AWG_JMIN=50
      - AWG_JMAX=1000
      - AWG_S1=15
      - AWG_S2=44
      - AWG_H1=1
      - AWG_H2=2
      - AWG_H3=3
      - AWG_H4=4
    volumes:
      - ./config:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
