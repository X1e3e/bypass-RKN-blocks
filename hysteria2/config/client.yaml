# Конфигурация клиента Hysteria 2 (для ПК / Sing-box / оригинального CLI)

# IP-адрес или домен вашего сервера и порт Hysteria 2
server: your_server_ip_or_domain:443

# Пароль авторизации (должен совпадать с паролем на сервере)
auth: your_very_secure_password_here

# Настройки TLS
tls:
  # SNI (Server Name Indication) — имя сайта маскировки
  sni: www.microsoft.com
  
  # Установите true, если на сервере используется самоподписанный SSL-сертификат.
  # Если используется Let's Encrypt (ACME), установите false.
  insecure: true

# Локальные порты, которые откроет клиент на вашем компьютере для подключения приложений
socks5:
  listen: 127.0.0.1:10808
http:
  listen: 127.0.0.1:10809

# Пропускная способность вашего интернет-канала (крайне важно указать для правильной работы BBR)
# Укажите реальные лимиты вашего тарифа (например, 50 mbps на отдачу, 100 mbps на загрузку)
bandwidth:
  up: 50 mbps
  down: 100 mbps

# Быстрое открытие TCP-соединений
fastOpen: true

# Режим обхода блокировки UDP портов (Port Hopping), если провайдер блокирует порт 443/UDP.
# На сервере и клиенте должны быть настроены правила перенаправления портов.
# hop: 20000-50000
